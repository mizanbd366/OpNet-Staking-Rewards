<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpNet Staking Pro Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #161b22; padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6); width: 400px; }
        h1 { color: #58a6ff; font-size: 26px; margin-bottom: 5px; }
        .tagline { font-size: 12px; color: #8b949e; margin-bottom: 25px; }
        
        /* ফিচার বক্সগুলো */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #ffffff; }
        .highlight { color: #3fb950; }

        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; text-align: center; font-size: 16px; }
        button { background-color: #238636; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        button:hover { background-color: #2ea043; transform: translateY(-2px); }
        .withdraw-btn { background-color: transparent; border: 1px solid #f85149; color: #f85149; }
        .withdraw-btn:hover { background-color: #f85149; color: white; }
        
        .footer-note { font-size: 11px; margin-top: 20px; color: #484f58; border-top: 1px solid #30363d; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 OpNet Staking</h1>
        <p class="tagline">Secure DeFi Staking Protocol</p>

        <div class="grid">
            <div class="stat-box">
                <div class="stat-label">Total Staked</div>
                <div class="stat-value">1.2M OPN</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Annual APY</div>
                <div class="stat-value highlight">12.5%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Your Balance</div>
                <div class="stat-value">0.00 OPN</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Rewards Earned</div>
                <div class="stat-value highlight">0.000 OPN</div>
            </div>
        </div>

        <input type="number" placeholder="0.00">
        <button onclick="alert('Connecting to OpNet Smart Contract...')">Stake Tokens</button>
        <button class="withdraw-btn" onclick="alert('Claiming Rewards & Unstaking...')">Withdraw Everything</button>

        <div class="footer-note">
            Contract: 0xOpNet...Staking | Audit: Passed ✅
        </div>
    </div>
</body>
</html>
