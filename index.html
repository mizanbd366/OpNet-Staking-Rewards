<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpNet Pro Staking Dashboard</title>
    <style>
        /* আগের সব ডিজাইন স্টাইল এখানে থাকবে */
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header { width: 100%; padding: 20px; display: flex; justify-content: flex-end; position: absolute; top: 0; box-sizing: border-box; }
        .connect-btn { background-color: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .container { background-color: #161b22; padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; width: 380px; }
        .main-btn { background-color: #238636; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <button id="walletBtn" class="connect-btn" onclick="connectOPWalletOnly()">Connect OP-Wallet</button>
    </div>

    <div class="container">
        <h1>🌐 OpNet Staking</h1>
        <p>Annual APY: <span style="color: #3fb950;">12.5%</span></p>
        <div id="balanceBox" style="background: #0d1117; padding: 15px; border-radius: 12px; margin-bottom: 10px;">
            <small>Your Balance</small>
            <div id="userBalance" style="font-size: 20px; font-weight: bold;">0.00 OPN</div>
        </div>
        <button class="main-btn" onclick="stake()">Stake Now</button>
    </div>

    <script>
        async function connectOPWalletOnly() {
            // Phantom বা অন্য ওয়ালেটের হস্তক্ষেপ এড়ানোর জন্য সরাসরি OP_WALLET অবজেক্ট খোঁজা
            const opProvider = window.opwallet; 

            if (opProvider) {
                try {
                    // এটি সরাসরি OP_WALLET পপ-আপ করবে
                    const accounts = await opProvider.requestAccounts();
                    const account = accounts[0];
                    
                    document.getElementById('walletBtn').innerText = account.substring(0,6) + "..." + account.slice(-4);
                    document.getElementById('walletBtn').style.color = "#3fb950";
                    document.getElementById('userBalance').innerText = "100.00 OPN";
                    alert("Successfully connected to OP-Wallet!");
                } catch (error) {
                    console.error(error);
                    alert("Connection rejected by user.");
                }
            } else {
                // যদি OP_WALLET না পাওয়া যায়
                alert("OP-Wallet Extension not found! Please make sure OP-Wallet is installed and enabled.");
                window.open("https://opnet.org", "_blank");
            }
        }

        function stake() {
            alert("Confirming transaction in OP-Wallet...");
        }
    </script>
</body>
</html>
