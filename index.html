<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpNet Staking Dashboard</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header { width: 100%; padding: 20px; display: flex; justify-content: flex-end; position: absolute; top: 0; box-sizing: border-box; }
        .connect-btn { background-color: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; z-index: 999; }
        .container { background-color: #161b22; padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-box { background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; }
        .main-btn { background-color: #238636; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .withdraw-btn { background-color: transparent; border: 1px solid #f85149; color: #f85149; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button id="walletBtn" class="connect-btn" onclick="connectOpWallet()">Connect OP-Wallet</button>
    </div>

    <div class="container">
        <h2 style="color: #58a6ff; margin: 0;">🌐 OpNet Staking</h2>
        <p style="font-size: 12px; color: #8b949e;">Secure Bitcoin-Layer DeFi</p>

        <div class="grid">
            <div class="stat-box"><div class="stat-label">APY</div><div class="stat-value" style="color: #3fb950;">12.5%</div></div>
            <div class="stat-box"><div class="stat-label">Total Staked</div><div class="stat-value">1.2M OPN</div></div>
            <div class="stat-box"><div class="stat-label">Your Balance</div><div id="balance" class="stat-value">0.00 OPN</div></div>
            <div class="stat-box"><div class="stat-label">Rewards</div><div class="stat-value" style="color: #3fb950;">0.00 OPN</div></div>
        </div>

        <button class="main-btn" onclick="signTx()">Stake Tokens</button>
        <button class="withdraw-btn" onclick="signTx()">Withdraw Rewards</button>
    </div>

    <script>
        async function connectOpWallet() {
            // OP_Wallet বা Unisat প্রোভাইডার চেক করা
            const provider = window.opwallet || window.unisat;

            if (provider) {
                try {
                    const accounts = await provider.requestAccounts();
                    const addr = accounts[0];
                    document.getElementById('walletBtn').innerText = addr.substring(0,6) + "..." + addr.slice(-4);
                    document.getElementById('balance').innerText = "100.00 OPN";
                    alert("OP-Wallet Connected Successfully!");
                } catch (e) {
                    alert("Connection rejected.");
                }
            } else {
                alert("OP-Wallet not detected! Please open the extension and UNLOCK it first, then refresh this page.");
            }
        }

        function signTx() {
            alert("Confirm this action in your OP-Wallet extension.");
        }
    </script>
</body>
</html>
